<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#f39461",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#b6c4ff",
                    "tertiary": "#4b1c00",
                    "tertiary-fixed-dim": "#ffb691",
                    "surface-tint": "#4059aa",
                    "on-primary-fixed-variant": "#264191",
                    "primary-container": "#1e3a8a",
                    "on-secondary-container": "#007432",
                    "on-secondary-fixed-variant": "#005321",
                    "on-surface-variant": "#444651",
                    "primary-fixed-dim": "#b6c4ff",
                    "surface-container-low": "#f3f4f6",
                    "inverse-on-surface": "#f0f1f3",
                    "on-tertiary-fixed": "#341100",
                    "outline-variant": "#c5c5d3",
                    "background": "#f8f9fb",
                    "surface-container": "#edeef0",
                    "on-tertiary-fixed-variant": "#773205",
                    "inverse-surface": "#2e3132",
                    "on-secondary-fixed": "#002109",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e1e2e4",
                    "on-surface": "#191c1e",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#6bff8f",
                    "on-tertiary": "#ffffff",
                    "surface": "#f8f9fb",
                    "secondary-fixed-dim": "#4ae176",
                    "surface-dim": "#d9dadc",
                    "surface-bright": "#f8f9fb",
                    "secondary": "#006e2f",
                    "surface-container-high": "#e7e8ea",
                    "on-primary-fixed": "#00164e",
                    "surface-variant": "#e1e2e4",
                    "primary-fixed": "#dce1ff",
                    "on-background": "#191c1e",
                    "tertiary-container": "#6e2c00",
                    "primary": "#00236f",
                    "on-primary-container": "#90a8ff",
                    "tertiary-fixed": "#ffdbcb",
                    "secondary-container": "#6bff8f",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "outline": "#757682"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .tonal-boundary {
            background-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(248, 249, 251, 0.7);
            backdrop-filter: blur(24px);
        }
        .glow-sphere {
            background: radial-gradient(circle, rgba(144, 168, 255, 0.2) 0%, rgba(248, 249, 251, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- TopAppBar -->
<header class="w-full top-0 px-6 pt-4 bg-transparent no-line tonal-boundary">
<div class="flex justify-between items-center w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-900 dark:text-blue-100 text-3xl" data-icon="bubble_chart">bubble_chart</span>
<span class="font-['Space_Grotesk'] font-bold text-2xl tracking-tighter text-blue-900 dark:text-blue-100">LifeOS</span>
</div>
<button class="text-slate-400 dark:text-slate-500 font-['Manrope'] font-semibold hover:opacity-80 transition-opacity active:scale-[0.98]">
                Skip
            </button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8 relative overflow-hidden">
<!-- Background decorative element -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center">
<div class="w-[600px] h-[600px] glow-sphere"></div>
</div>
<!-- Vision Hero Section -->
<div class="relative z-10 w-full max-w-lg text-center flex flex-col items-center">
<!-- Central Icon Visual -->
<div class="relative w-64 h-64 mb-12 flex items-center justify-center">
<div class="absolute inset-0 bg-primary-container/5 rounded-full blur-3xl animate-pulse"></div>
<div class="relative w-48 h-48 bg-surface-container-lowest rounded-[40px] shadow-[0_32px_64px_rgba(0,35,111,0.08)] flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-7xl text-primary" data-icon="psychology" style="font-variation-settings: 'FILL' 1;">psychology</span>
<div class="absolute -top-4 -right-4 w-20 h-20 bg-gradient-to-br from-secondary-fixed to-secondary-fixed-dim rounded-3xl shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-3xl text-on-secondary-fixed" data-icon="dashboard">dashboard</span>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-6 mb-12">
<h1 class="font-headline font-bold text-5xl tracking-tight text-primary leading-[1.1]">
                    Welcome to Your <br/>LifeOS
                </h1>
<p class="font-body text-on-surface-variant text-lg max-w-xs mx-auto leading-relaxed">
                    Your entire life, managed in one smart, beautiful place.
                </p>
</div>
</div>
</main>
<!-- Walkthrough Navigation & Progress -->
<footer class="w-full px-8 pb-16 pt-6 flex flex-col items-center space-y-8 relative z-20">
<!-- Progress Dots -->
<div class="flex items-center gap-3">
<div class="w-8 h-2 bg-primary rounded-full transition-all duration-300"></div>
<div class="w-2 h-2 bg-surface-container-highest rounded-full transition-all duration-300"></div>
<div class="w-2 h-2 bg-surface-container-highest rounded-full transition-all duration-300"></div>
<div class="w-2 h-2 bg-surface-container-highest rounded-full transition-all duration-300"></div>
</div>
<!-- Bottom Navigation Area -->
<div class="w-full max-w-md flex flex-col items-center">
<button class="w-full bg-gradient-to-br from-[#00236f] to-[#1e3a8a] text-white py-5 px-8 rounded-2xl font-['Manrope'] font-bold text-lg shadow-[0_12px_32px_rgba(0,35,111,0.2)] active:scale-[0.98] transition-all hover:brightness-110 flex items-center justify-center gap-2 group">
                Get Started
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Decorative Bottom Shell (Mirroring the BottomNavBar structure from JSON but styled for Onboarding focus) -->
<div class="fixed bottom-0 left-0 w-full flex flex-col items-center pointer-events-none">
<div class="w-full h-32 bg-gradient-to-t from-surface via-surface/80 to-transparent"></div>
</div>
</body></html>
