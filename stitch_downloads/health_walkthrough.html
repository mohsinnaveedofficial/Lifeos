<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-boundary {
            background-clip: padding-box;
        }
        .glass-card {
            background: rgba(248, 249, 251, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body text-on-surface antialiased overflow-hidden min-h-screen flex flex-col">
<header class="w-full top-0 px-6 pt-4 bg-transparent no-line flex justify-between items-center w-full max-w-screen-xl mx-auto z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-900 dark:text-blue-100" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
<span class="font-['Space_Grotesk'] font-bold text-2xl tracking-tighter text-blue-900 dark:text-blue-50">LifeOS</span>
</div>
<button class="text-blue-900 dark:text-blue-100 font-['Manrope'] font-semibold hover:opacity-80 transition-opacity active:scale-[0.95]">Skip</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8 relative">
<div class="absolute inset-0 z-0 bg-gradient-to-b from-blue-50/50 to-transparent pointer-events-none"></div>
<div class="relative z-10 w-full max-w-md flex flex-col items-center">
<div class="relative w-72 h-72 mb-12 flex items-center justify-center">
<div class="absolute inset-0 bg-blue-100/30 rounded-full blur-3xl animate-pulse"></div>
<div class="relative w-64 h-64 rounded-full p-2 border-[12px] border-surface-container-high flex items-center justify-center overflow-hidden">
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-secondary" cx="50%" cy="50%" fill="transparent" r="46%" stroke="currentColor" stroke-dasharray="289" stroke-dashoffset="72" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-6xl text-primary mb-2" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-headline font-bold text-4xl text-on-surface tracking-tighter">84</span>
<span class="font-label text-sm text-outline uppercase tracking-widest font-bold">Health Score</span>
</div>
</div>
<div class="absolute top-0 right-0 p-4 glass-card rounded-2xl shadow-sm border-[0.5px] border-outline-variant/15 flex items-center gap-3">
<span class="material-symbols-outlined text-blue-500">water_drop</span>
<div>
<p class="text-[10px] text-outline font-bold uppercase tracking-tight">Hydration</p>
<p class="text-sm font-bold text-on-surface">1.8L / 2.5L</p>
</div>
</div>
<div class="absolute bottom-4 left-0 p-4 glass-card rounded-2xl shadow-sm border-[0.5px] border-outline-variant/15 flex items-center gap-3">
<span class="material-symbols-outlined text-on-tertiary-container">bedtime</span>
<div>
<p class="text-[10px] text-outline font-bold uppercase tracking-tight">Sleep Quality</p>
<p class="text-sm font-bold text-on-surface">Deep • 7h 20m</p>
</div>
</div>
</div>
<div class="text-center space-y-4 mb-16">
<h1 class="font-headline font-bold text-4xl text-on-surface tracking-tight leading-none">
                    Master Your Vitality
                </h1>
<p class="font-body text-lg text-on-surface-variant leading-relaxed px-4">
                    Track your health score, hydration, and sleep to perform at your peak.
                </p>
</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex flex-col items-center px-8 pb-12 pt-6">
<div class="flex items-center gap-2 mb-8">
<div class="w-2 h-2 rounded-full bg-slate-300 dark:text-slate-600"></div>

<div class="w-2 h-2 rounded-full bg-slate-300 dark:text-slate-600"></div>
</div>

<span>Next</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
